// Helper: get the effective payment value from either the select or the custom input
function getMetaPaymentValue(){
  const sel = document.getElementById('meta-payment-sel');
  const custom = document.getElementById('meta-payment');
  if(sel && sel.value === '__custom__') return custom?.value || '';
  if(sel && sel.value) return sel.value;
  return custom?.value || '';
}

// Helper: pre-select the dropdown matching a stored payment string
function setMetaPaymentDropdown(val){
  const sel = document.getElementById('meta-payment-sel');
  const custom = document.getElementById('meta-payment');
  if(!sel || !val) return;
  // Try exact match in options
  let matched = false;
  for(let o of sel.options){
    if(o.value === val){ sel.value = val; matched = true; break; }
  }
  if(!matched){
    // Try fuzzy — match by start of value
    for(let o of sel.options){
      if(o.value && val.toLowerCase().startsWith(o.value.toLowerCase().slice(0,15))){ sel.value = o.value; matched = true; break; }
    }
  }
  if(!matched && val){
    sel.value = '__custom__';
    if(custom){ custom.style.display='block'; custom.value=val; }
  } else if(custom){
    custom.style.display = 'none';
    custom.value = matched ? sel.value : '';
  }
}

function syncMetaToTemplate(){
  function fmtDate(iso){
    if(!iso) return '';
    try{ return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }
    catch(e){ return iso; }
  }
  const prog = document.getElementById('meta-program')?.value;
  const ctxProg = document.getElementById('ctx-program');
  if(ctxProg && prog !== undefined) ctxProg.value = prog;

  // Quote title → ctx-quote-title
  const qtVal = document.getElementById('meta-quote-title')?.value;
  const ctxQt = document.getElementById('ctx-quote-title');
  if(ctxQt && qtVal !== undefined) ctxQt.value = qtVal;

  // Governing agreement → ctx-governing (read from terms-governing or saved quote)
  const govVal = document.getElementById('terms-governing')?.value;
  const ctxGov = document.getElementById('ctx-governing');
  if(ctxGov && govVal !== undefined) ctxGov.value = govVal;

  const issueVal = document.getElementById('meta-issue')?.value;
  const issueEl  = document.getElementById('tmpl-issue-date');
  if(issueEl && issueVal) issueEl.textContent = fmtDate(issueVal);

  // Compute validity from issue date + 30/60 days toggle
  const issueForValidity = document.getElementById('meta-issue')?.value;
  const validDaysEl = document.querySelector('[name="meta-validity-days"]:checked');
  const validDays = validDaysEl ? parseInt(validDaysEl.value) : 30;
  const validLabel = computeValidUntilLabel(issueForValidity, validDays);
  const validEl = document.getElementById('tmpl-valid-until');
  if(validEl) validEl.textContent = validLabel;

  // Update the preview under the toggle
  const validPreview = document.getElementById('meta-validity-preview');
  if(validPreview) validPreview.textContent = validLabel;
  // Also push to terms-validity
  const termsV = document.getElementById('terms-validity');
  if(termsV) termsV.value = validDays + ' days';


  const craVal = document.getElementById('meta-cra')?.value;
  const craEl  = document.getElementById('tmpl-cra-ref');
  if(craEl && craVal) craEl.textContent = craVal;

  // ── Push owner + version to template header ──
  const ownerHdr = document.getElementById('tmpl-owner-hdr');
  const ownerV = document.getElementById('meta-owner')?.value;
  if(ownerHdr) ownerHdr.textContent = ownerV || '—';

  const verInp = document.getElementById('meta-version');
  const verHdr = document.getElementById('tmpl-version-hdr');
  if(verHdr && verInp) verHdr.textContent = 'v' + (verInp.value || 1);

  const custVal = document.getElementById('meta-customer')?.value;
  const custParty = document.getElementById('tmpl-customer-name');
  if(custParty && custVal) custParty.textContent = custVal;
  const ctxCust = document.getElementById('ctx-customer');
  if(ctxCust && custVal){
    let opt = ctxCust.querySelector(`option[value="${custVal}"]`);
    if(!opt){ opt=document.createElement('option');opt.value=custVal;opt.textContent=custVal;ctxCust.appendChild(opt); }
    ctxCust.value = custVal;
    if(typeof updateFeeLanguage==='function') updateFeeLanguage();
  }
  document.querySelectorAll('#ip-customer, .ip-cust-ref').forEach(el=>{ if(custVal) el.textContent=custVal; });
  // Also update customer signature header first line
  const sigCustHd = document.getElementById('sig-cust-hd');
  if(sigCustHd && custVal) {
    const sub = sigCustHd.querySelector('.sig-hd-sub');
    sigCustHd.childNodes[0].textContent = custVal;
    // Re-attach sub if it was wiped
    if(sub && !sigCustHd.contains(sub)) sigCustHd.appendChild(sub);
  }
  // ── Lead time → all template lead-time fields ──
  const ltVal = document.getElementById('meta-leadtime')?.value;
  if(ltVal !== undefined){
    ['lt-leadtime','prod-leadtime','tmpl-leadtime-display','tst-leadtime-display','lab-leadtime-display','fee-leadtime-display'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.value=ltVal;
    });
  }
  // ── Payment terms → all template payment positions ──
  const payVal = getMetaPaymentValue();
  if(payVal){
    // Terms block payment milestone
    const pm = document.getElementById('payment-milestone'); if(pm) pm.value = payVal;
    // NRE context band payment-trigger select — match closest option
    const pt = document.getElementById('payment-trigger');
    if(pt){
      let matched = false;
      for(let o of pt.options){ if(o.value && payVal.toLowerCase().includes(o.value.toLowerCase().slice(0,14))){ pt.value=o.value; matched=true; break; } }
      if(!matched){ const co=document.createElement('option');co.value=payVal;co.textContent=payVal;pt.appendChild(co);pt.value=payVal; }
      if(typeof updateFeeLanguage==='function') updateFeeLanguage();
    }
    // PPQ / PROD / TLG / VVQ / TST / LAB — push into all payment display inputs
    ['tmpl-payment-display','prod-payment-display','tst-payment-display','lab-payment-display','fee-payment-display'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.value=payVal;
    });
  }
  // ── Quote validity → terms-validity field ──

  if(editingId){
    try{ const _lqs=JSON.parse(localStorage.getItem(SK)||'[]'); const _lq=_lqs.find(x=>x.id===editingId);
    if(_lq){ const refEl=document.getElementById('meta-ref'); if(refEl) refEl.textContent=qRef(_lq); } }catch(e){} 
  }
}

// ── Sync from template editable fields → hidden meta inputs (used on save) ──
function syncTemplateToMeta(){
  // CRA
  const craEl = document.getElementById('tmpl-cra-ref');
  const craHidden = document.getElementById('meta-cra');
  if(craEl && craHidden) craHidden.value = craEl.textContent.trim();

  // Issue date — parse formatted date back to ISO
  const issueEl = document.getElementById('tmpl-issue-date');
  const issueHidden = document.getElementById('meta-issue');
  if(issueEl && issueHidden){
    try{
      const d = new Date(issueEl.textContent.trim());
      if(!isNaN(d)) issueHidden.value = d.toISOString().split('T')[0];
    }catch(e){}
  }

  // Valid until
  const validEl = document.getElementById('tmpl-valid-until');
  const validHidden = document.getElementById('meta-valid');
  if(validEl && validHidden){
    try{
      const d = new Date(validEl.textContent.trim());
      if(!isNaN(d)) validHidden.value = d.toISOString().split('T')[0];
    }catch(e){}
  }
}

// ── PRINT / PDF ──────────────────────────────────────────────────────────
function printQuote(){
  // ── Build PDF filename from quote data ──────────────────────────────────
  // Format: EXL-{TYPE}-{####} {Customer} {Program} {DD-MMM-YYYY}
  const _pq_qs = JSON.parse(localStorage.getItem(SK)||'[]');
  const q = editingId ? _pq_qs.find(x => x.id === editingId) : null;
  const originalTitle = document.title;

  if(q) {
    const typeCode = (TYPE_CONFIG[q.type] ? q.type.toUpperCase() : 'QTE');
    const quoteNum = String(q.id).padStart(4, '0');
    const ref      = 'EXL-' + typeCode + '-' + quoteNum;

    const customer = (q.customer || '').replace(/[/\\:*?"<>|]/g, '-').trim();
    const program  = (q.program  || '').replace(/[/\\:*?"<>|]/g, '-').trim();

    // Print date (today)
    const now = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const printDate = String(now.getDate()).padStart(2,'0') + '-' + months[now.getMonth()] + '-' + now.getFullYear();

    const quoteTitle = (q.quoteTitle || '').replace(/[/\\:*?"<>|]/g, '-').trim();
    const ver = q.version ? 'v' + q.version : '';
    const parts = [ref, ver, program, quoteTitle, customer].filter(Boolean);
    document.title = parts.join(' - ');
  }

  // ── Inject print styles ──────────────────────────────────────────────────
  const style = document.createElement('style');
  style.id = 'print-override';
  style.textContent = `
    @media print {
      /* Hide all chrome — sidebar, topbar, meta form, action bars */
      .sidebar, .topbar, .form-view-header,
      .tb-actions, .fv-actions, .back-btn,
      .card:not(.no-print-hide), .template-wrap ~ *,
      .tbl-toolbar, .tbl-actions, .del-btn,
      .excl-add, .excl-del, .lt-add, .add-btn,
      .paste-zone, .print-btn { display: none !important; }

      /* Reset every box model so nothing clips */
      *, *::before, *::after { box-sizing: border-box !important; }

      html, body {
        width: 210mm !important;
        max-width: 210mm !important;
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        overflow: visible !important;
      }

      /* The app wrapper — collapse to block so the template fills the page */
      .app {
        display: block !important;
        width: 210mm !important;
        max-width: 210mm !important;
        height: auto !important;
        overflow: visible !important;
      }

      /* The scrollable main content area — remove scroll clip */
      .main, .content {
        display: block !important;
        width: 210mm !important;
        max-width: 210mm !important;
        height: auto !important;
        overflow: visible !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      /* Template wrapper — strip all decorative spacing */
      .template-wrap {
        background: white !important;
        padding: 0 !important;
        margin: 0 !important;
        border-radius: 0 !important;
        width: 210mm !important;
        max-width: 210mm !important;
        overflow: visible !important;
      }

      /* The A4 page itself */
      .template-wrap .page {
        width: 210mm !important;
        max-width: 210mm !important;
        box-shadow: none !important;
        margin: 0 !important;
        overflow: visible !important;
      }

      /* ── Strip all placeholder / example text when printing ── */
      /* Hide placeholder pseudo-element so empty fields print blank */
      .template-wrap input::placeholder,
      .template-wrap textarea::placeholder { color: transparent !important; }

      /* Inputs/textareas with no real value should be invisible (just the underline shows) */
      .template-wrap input:placeholder-shown:not([type="number"]):not([type="checkbox"]),
      .template-wrap textarea:placeholder-shown {
        color: transparent !important;
      }

      /* Number inputs with placeholder value "0.00" or "1" that are still 0 / empty */
      .template-wrap input[type="number"]:placeholder-shown {
        color: transparent !important;
      }

      /* Hide the "Print name", "Title", "— / — / ——" placeholder text in sig lines */
      .template-wrap .sig-line input::placeholder { color: transparent !important; }

      /* Hide the paste zone entirely */
      .paste-zone { display: none !important; }

      /* Hide toolbar buttons and add-row controls */
      .tbl-toolbar .add-btn, .tbl-toolbar label,
      .tbl-actions, .del-btn, .excl-add, .excl-del,
      .lt-add, .add-btn, .print-btn { display: none !important; }
    }
  `;
  document.head.appendChild(style);
  window.print();
  // Restore title and remove override style after print dialog closes
  setTimeout(()=>{
    document.title = originalTitle;
    const el = document.getElementById('print-override');
    if(el) el.remove();
  }, 1500);
}

function tmplInit(q) {
  // Execute template JS in current page scope
  // (template functions like switchType, recalcAll etc. are defined inline below)

  // Populate the entity selector dropdown with all known entities
  // and apply the currently active entity
  const ent = (typeof getActiveEntity === 'function') ? getActiveEntity() : {id:'tyber',name:'Tyber Medical LLC',dba:'Exalta Group',address:'89 Headquarters Plaza, Morristown NJ 07960, United States',footer:'Tyber Medical LLC (D.B.A. Exalta Group) · 89 Headquarters Plaza, Morristown NJ 07960 · www.exalta.com'};
  const entFullName = (typeof entityDisplayName === 'function') ? entityDisplayName(ent) : ent.name + (ent.dba ? ` (D.B.A. ${ent.dba})` : '');

  setTimeout(() => {
    // Populate entity selector
    const entSel = document.getElementById('tmpl-entity-select');
    if(entSel && typeof getEntities === 'function') {
      const all = getEntities();
      entSel.innerHTML = all.map(e =>
        `<option value="${e.id}"${e.id===ent.id?' selected':''}>${e.name}</option>`
      ).join('') + '<option value="__add__">+ Add new entity…</option>';
      entSel.onchange = function() {
        if(this.value === '__add__') {
          if(typeof showAddEntityModal === 'function') showAddEntityModal();
          this.value = ent.id;
          return;
        }
        applyTemplateEntity(this.value);
      };
    }
    // Apply current entity to all template fields
    _applyEntityToTemplate(ent, entFullName);
  }, 50);

  if(!q){ switchType('nre'); recalcAll(); return; }

  // Pre-fill from quote
  const ts=document.getElementById('quote-type-select');
  if(ts){ts.value=q.type||'nre'; switchType(q.type||'nre');}
  // ctx-customer is hidden (removed from template UI) but still used by
  // updateFeeLanguage for the IP clause — set it programmatically
  const cs=document.getElementById('ctx-customer');
  if(cs&&q&&q.customer){
    // Ensure the customer value is in the select options
    const opt=cs.querySelector(`option[value="${q.customer}"]`);
    if(!opt){const o=document.createElement('option');o.value=q.customer;o.textContent=q.customer;cs.appendChild(o);}
    cs.value=q.customer;
    if(typeof updateFeeLanguage==='function')updateFeeLanguage();
  }
  const pg=document.getElementById('ctx-program');
  if(pg&&q.program)pg.value=q.program;
  const am=document.getElementById('nre-amount');
  if(am&&q.totalValue){am.value=q.totalValue; if(typeof updateFeeLanguage==='function')updateFeeLanguage();}
  const ft=document.getElementById('fee-type-select');
  if(ft&&q.nreType){ft.value=q.nreType; if(typeof updateFeeLanguage==='function')updateFeeLanguage();}
  const sc=document.getElementById('surgeon-count');
  if(sc&&q.surgeons){sc.value=q.surgeons; if(typeof updateFeeLanguage==='function')updateFeeLanguage();}
  const refEl=document.getElementById('meta-ref');
  if(refEl)refEl.textContent=qRef(q);
  const metas=document.querySelectorAll('.meta-val[contenteditable]');
  if(metas[3]&&q.cra)metas[3].textContent=q.cra;
  const parts=document.querySelectorAll('.party');
  if(parts[1]&&q.customer){const pn=parts[1].querySelector('.party-name');if(pn)pn.textContent=q.customer;}

  // ── Terms & conditions ─────────────────────────────────────────────────
  function _setField(id, val){ const el=document.getElementById(id); if(el&&val!=null&&val!==''){ if(el.tagName==='TEXTAREA') el.value=val; else el.value=val; } }
  _setField('terms-validity',    q.validity     || '30 days');
  _setField('payment-milestone', q.paymentExp  || q.payment || '');
  _setField('schedule-impact',   q.scheduleImpact || '');

          tr.innerHTML=`<td><input type="text" value="${(item.custPN||'').replace(/"/g,'&quot;')}" placeholder="P-00####"></td><td><input type="text" value="${(item.tyberPN||'').replace(/"/g,'&quot;')}" placeholder="P-00####"></td><td><input type="text" value="${(item.desc||'').replace(/"/g,'&quot;')}" placeholder="Description"></td><td><textarea rows="2" style="width:100%;border:none;background:transparent;font-family:'Barlow',sans-serif;font-size:9px;outline:none;resize:none">${(item.custPN||'')}</textarea></td><td><input type="number" class="num" value="${item.extQty||''}" min="0" oninput="recalcTlgRow(this)"></td><td><input type="number" class="num" value="${item.price||''}" min="0" step="0.01" oninput="recalcTlgRow(this)"></td><td><input type="number" class="ext" value="${item.ext||''}" readonly tabindex="-1"></td><td><button class="del-btn" onclick="delRow(this)">×</button></td>`;

        tstTbody.querySelectorAll('tr.part-row').forEach(r=>r.remove());
        items.forEach(item=>{
          const tr=document.createElement('tr');tr.className='part-row';
          const d=(item.desc||'');const pts=d.split(' — ');
          tr.innerHTML=`<td><input type="text" value="${(item.custPN||'').replace(/"/g,'&quot;')}" placeholder="—"></td><td><input type="text" value="${pts[0].replace(/"/g,'&quot;')}" placeholder="Test name"></td><td><input type="text" value="${(pts[1]||'').replace(/"/g,'&quot;')}" placeholder="ISO standard / method"></td><td><input type="text" value="" placeholder="Sample details"></td><td><input type="number" class="r" value="${item.extQty||1}" min="0" oninput="recalcTstRow(this)"></td><td><input type="number" class="r" value="${item.price||''}" min="0" step="0.01" oninput="recalcTstRow(this)"></td><td><input type="number" class="r ext" value="${item.ext||''}" readonly tabindex="-1"></td><td><button class="del-btn" onclick="delRow(this)">×</button></td>`;

        items.forEach(item=>{

  // EXP workstreams & exclusions
  if(q.type==='exp'){
    if(q.workstreams?.length){

        const extStyle="text-align:right;color:var(--blue);font-weight:700;width:100%;border:none;background:transparent;font-family:'Barlow',sans-serif;font-size:9px;outline:none";
        // Get cost from lineItems if available (match by workstream name or index)
        const liMap={};
        (q.lineItems||[]).forEach(li=>{
          const key=(li.bom||li.desc||'').toLowerCase();

        });
        q.workstreams.forEach((ws,i)=>{

          const qtyS="width:100%;border:none;background:transparent;font-family:'Barlow',sans-serif;font-size:9px;outline:none;text-align:right;color:var(--dark)";
          const numS="text-align:right;color:var(--blue);font-weight:600;width:100%;border:none;background:transparent;font-family:'Barlow',sans-serif;font-size:9px;outline:none";
          const extS="text-align:right;color:var(--blue);font-weight:700;width:100%;border:none;background:transparent;font-family:'Barlow',sans-serif;font-size:9px;outline:none";

            +`<td><input type="number" class="r scope-num" value="${unitCost||''}" placeholder="0.00" min="0" step="0.01" oninput="recalcExpRow(this)" style="${numS}"></td>`
            +`<td><input type="number" class="r scope-ext" value="${ext||''}" placeholder="0.00" readonly tabindex="-1" style="${extS}"></td>`
            +`<td><select style="${selS}" onchange="recalcExpAll()"><option${(li?.bom||'').toLowerCase().includes('labour')?` selected`:''}>Labour</option><option${(li?.bom||'').toLowerCase().includes('direct')?` selected`:''}>Direct</option><option>Third party</option></select></td>`
            +`<td><button class="del-btn" onclick="delRow(this)">×</button></td>`;
          expTbody.appendChild(tr);
        });
        setTimeout(()=>{ if(typeof recalcExpAll==='function') recalcExpAll(); }, 100);
      }
    }
    if(q.exclusions?.length){
      const exclList=document.getElementById('excl-list');
      if(exclList){exclList.innerHTML='';q.exclusions.forEach(e=>{const div=document.createElement('div');div.className='excl-item';div.innerHTML=`<input type="text" value="${e.replace(/"/g,'&quot;')}"><button class="excl-del" onclick="delExclusion(this)">×</button>`;exclList.appendChild(div);});}
    }
  }
  if(typeof recalcAll==='function')recalcAll();

  // Sync meta bar values into template on initial load
  setTimeout(()=>{ syncMetaToTemplate(); persistTemplateState(); }, 300);

  // ── Autosave: persist template state to localStorage on every input/change ──
  // Use a debounced listener on the template-wrap container
  const templateWrap = document.getElementById('template-wrap');
  if(templateWrap) {
    const debouncedSave = (function(){
      let t;
      return function(){ clearTimeout(t); t = setTimeout(persistTemplateState, 600); };
    })();
    // Remove previous listener if any (avoid duplicates on re-render)
    templateWrap.removeEventListener('input', templateWrap._autoSave);
    templateWrap.removeEventListener('change', templateWrap._autoSave);
    templateWrap._autoSave = debouncedSave;
    templateWrap.addEventListener('input', debouncedSave);
    templateWrap.addEventListener('change', debouncedSave);
  }

  // ── Date sync: app header → template, and template → app on edit ────────
  setTimeout(()=>{
    const issueEl  = document.getElementById('tmpl-issue-date');
    const validEl  = document.getElementById('tmpl-valid-until');
    const appIssue = document.getElementById('meta-issue');
    const appValid = document.getElementById('meta-valid');

    function fmtDate(iso){
      if(!iso) return '— / — / ——';
      try{
        return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      }catch(e){return iso;}
    }

    // Push app values → template on load
    if(issueEl && appIssue && appIssue.value) {
      issueEl.textContent = fmtDate(appIssue.value);
    }
    if(validEl && appValid && appValid.value) {
      validEl.textContent = fmtDate(appValid.value);
    }

    // When user edits template dates → sync back to app inputs
    if(issueEl && appIssue) {
      issueEl.addEventListener('blur', () => {
        try{ const d=new Date(issueEl.textContent.trim()); if(!isNaN(d)) appIssue.value=d.toISOString().split('T')[0]; }catch(e){}
      });
    }
    if(validEl && appValid) {
      validEl.addEventListener('blur', () => {
        try{ const d=new Date(validEl.textContent.trim()); if(!isNaN(d)) appValid.value=d.toISOString().split('T')[0]; }catch(e){}
      });
    }
    // Wire CRA blur → hidden input
    const craEl2 = document.getElementById('tmpl-cra-ref');
    const craHid = document.getElementById('meta-cra');
    if(craEl2 && craHid) {
      craEl2.addEventListener('blur', () => { craHid.value = craEl2.textContent.trim(); });
    }
  }, 200);
}

// Called when entity selector changes inside the template
function applyTemplateEntity(entityId) {
  const ent = (typeof getEntities === 'function') ? getEntities().find(e=>e.id===entityId) : null;
  if(!ent) return;
  const fullName = (typeof entityDisplayName === 'function') ? entityDisplayName(ent) : ent.name;
  _applyEntityToTemplate(ent, fullName);
}

function _applyEntityToTemplate(ent, fullName) {
  if(!ent) return;
  // Party block
  const partyBlocks = document.querySelectorAll('.party');
  if(partyBlocks[0]) {
    const pn = partyBlocks[0].querySelector('.party-name');
    const pd = partyBlocks[0].querySelector('.party-detail');
    if(pn) pn.textContent = ent.name;
    if(pd) pd.innerHTML = (ent.dba ? `D.B.A. ${ent.dba} &middot; ` : '') + 'Development &amp; Manufacturing Partner<br>' + ent.address;
  }
  // IP clause entity references
  document.querySelectorAll('#ip-entity, .ip-entity-ref').forEach(el => el.textContent = fullName);
  // Footer band
  const footerL = document.querySelector('.footer-band .footer-l');
  if(footerL) footerL.textContent = ent.footer || fullName;
  // Header entity name
  const hdrEnt = document.getElementById('hdr-entity-name');
  if(hdrEnt) hdrEnt.textContent = ent.name;
  // Signature header
  const sigHds = document.querySelectorAll('.sig-hd');
  if(sigHds[0]) {
    sigHds[0].childNodes[0].textContent = fullName;
    if(!sigHds[0].querySelector('.sig-hd-sub')) {
      const sub = document.createElement('span');
      sub.className = 'sig-hd-sub';
      sub.textContent = 'Authorised Signatory';
      sigHds[0].appendChild(sub);
    }
  }
  // Fee footnote
  const footnote = document.querySelector('#shared-nre-footnote span:last-child');
  if(footnote) footnote.innerHTML = `<strong>Important:</strong> The Non-Recurring Engineering fee stated above represents a partial contribution toward the actual engineering costs incurred by ${fullName}. The NRE fee does not constitute full reimbursement of all costs associated with the respective development program.`;
  // Fee paragraph entity name
  const fp = document.getElementById('fee-para');
  if(fp && fp.value) {
    fp.value = fp.value
      .replace(/Tyber Medical LLC \(D\.B\.A\. Exalta Group\)/g, fullName)
      .replace(/Pioneer Surgical Technology Inc\. \(D\.B\.A\. Exalta Group\)/g, fullName)
      .replace(/[A-Za-z]+ [A-Za-z]+ LLC \(D\.B\.A\. Exalta Group\)/g, fullName);
  }
  // Update IP customer reference too
  if(typeof updateFeeLanguage === 'function') updateFeeLanguage();
}

const ALL_BLOCKS = ['block-nre-context','block-scope','block-fee','block-terms','block-parts','block-prod','block-tst','block-lab'];
const SCOPE_NOTES_BLOCKS = ['block-scope-ctx','block-notes-box','ppq-nre-banner','ppq-surgeon-banner','indicative-pricing-box'];

let currentType = 'nre';

function switchType(type) {
  currentType = type;
  // Keep meta-type select in sync
  const metaTypeSel = document.getElementById('meta-type');
  if(metaTypeSel && metaTypeSel.value !== type) metaTypeSel.value = type;
  const cfg = TYPE_CONFIG[type];
  if(!cfg) return;

  // Update select colour
  const sel = document.getElementById('quote-type-select');
  if(sel) sel.className = 'type-select ' + cfg.cls;

  // Update header title
  const docTitle = document.getElementById('doc-title');
  if(docTitle) docTitle.innerHTML = cfg.label + '<br><em>' + cfg.sub + '</em>';
  // Header quote type badge
  const hdrQt = document.getElementById('hdr-quote-type');
  if(hdrQt) hdrQt.textContent = cfg.label;
  // If switching to lab type, recalc totals after blocks are shown
  if(type === 'lab') setTimeout(recalcLabAllInit, 50);

  // Update quote ref
  const metaRef = document.getElementById('meta-ref');
  if(metaRef) metaRef.textContent = cfg.ref;

  // Show/hide round row in meta

  // Hide all blocks, show configured ones
  ALL_BLOCKS.forEach(b => {
    const el = document.getElementById(b);
    if(el) el.style.display = 'none';
  });
  // Also hide scope/notes/banner overlays on every type switch
  (typeof SCOPE_NOTES_BLOCKS!=='undefined' ? SCOPE_NOTES_BLOCKS : []).forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  (cfg.showBlocks||[]).forEach(b => {
    const el = document.getElementById(b);
    if(el) el.style.display = '';
  });

  // Scope variants
  const ss = document.getElementById('scope-simple');
  const se = document.getElementById('scope-exp');
  if(ss) ss.style.display = cfg.showScopeSimple ? '' : 'none';
  if(se) se.style.display = cfg.showScopeExp   ? '' : 'none';

  // Update scope-exp table header and label based on nre vs exp
  const _bsl = document.querySelector('#block-scope .block-label');
  if(_bsl) {
    const _num = _bsl.querySelector('.block-num');
    _bsl.innerHTML = (_num ? _num.outerHTML : '<span class="block-num">2</span>')
      + (type==='exp' ? 'Additive scope &amp; fee by workstream' : 'Scope of work &amp; fee breakdown');
  }
  // Toggle which header row to show (EXP has "Existing scope" col, NRE does not)
  const _hExp = document.getElementById('scope-exp-head-exp');
  const _hNre = document.getElementById('scope-exp-head-nre');
  const _totLbl = document.getElementById('exp-total-label');
  if(_hExp) _hExp.style.display = (type==='exp') ? '' : 'none';
  if(_hNre) _hNre.style.display = (type==='exp') ? 'none' : '';
  if(_totLbl) _totLbl.textContent = (type==='exp') ? 'Total Scope Expansion Fee (USD)' : 'Total NRE Fee (USD)';
  // In NRE mode hide the "existing scope" col in rows
  document.querySelectorAll('#scope-exp-tbody td[class="col-existing"], #scope-exp-tbody td:nth-child(2)').forEach(td => {
    td.style.display = (type==='exp') ? '' : 'none';
  });

  // Parts table variant
  const ptPpq = document.getElementById('part-table-ppq');
  const ptTlg = document.getElementById('part-table-tlg');
  const surRow = document.getElementById('surcharge-row');
  if(ptPpq) ptPpq.style.display = (cfg.partsTbl === 'ppq') ? '' : 'none';
  if(ptTlg) ptTlg.style.display = (cfg.partsTbl === 'tlg') ? '' : 'none';
  if(surRow) surRow.style.display = (type === 'tlg') ? 'flex' : 'none';

  // Paste zone
  const pz = document.getElementById('paste-zone');
  if(pz) pz.style.display = cfg.pasteZone ? '' : 'none';

  // Context band labels
  const l1 = document.getElementById('ctx-extra-1-lbl');
  const l2 = document.getElementById('ctx-extra-2-lbl');
  if(l1) l1.textContent = cfg.ctx3lbl || '';
  if(l2) l2.textContent = cfg.ctx4lbl || '';

  // NRE fee type selector visibility
  const fts = document.getElementById('fee-type-select');
  const sc = document.getElementById('surgeon-count');
  if(fts) fts.closest('.ctx-f').style.display = (type==='nre'||type==='exp') ? '' : 'none';
  if(sc) sc.closest('.ctx-f').style.display  = (type==='nre'||type==='exp') ? '' : 'none';

  // Update parts block label
  if(cfg.partsLbl) {
    const pl = document.getElementById('parts-block-lbl');
    if(pl) pl.textContent = cfg.partsLbl;
  }

  // IP box — show only for NRE / EXP
  const ip = document.querySelector('.ip-box');
  if(ip) ip.style.display = (type==='nre'||type==='exp') ? '' : 'none';

  updateFeeLanguage();
}

function updateFeeLanguage() {
  const type   = document.getElementById('fee-type-select')?.value || 'standard';
  const n      = parseInt(document.getElementById('surgeon-count')?.value) || 4;
  const nr     = document.getElementById('nonrefund-check')?.checked;
  const amt    = parseFloat(document.getElementById('nre-amount')?.value) || 0;
  const custEl = document.getElementById('ctx-customer');
  const cust   = custEl ? (custEl.value || '[Customer]') : '[Customer]';
  const entity = (typeof getActiveEntity === 'function') ? entityDisplayName(getActiveEntity()) : 'Tyber Medical LLC (D.B.A. Exalta Group)';
  const nrText = nr ? 'non-recurring non-refundable' : 'non-recurring';
  const fmtAmt = amt > 0 ? '$' + amt.toLocaleString('en-US') : '$[AMOUNT]';
  const prereq = document.getElementById('ip-prereq');

  let para = '';
  if(type === 'standard') {
    para = cust + ' will pay ' + entity + ' ' + fmtAmt + ' for ' + nrText + ' fees associated with manufacturing and delivery of the prototype parts, an evaluation lab with up to ' + n + ' surgeons, and the mobilization and dedication of ' + entity + ' resources related to the foregoing.';
    if(prereq) prereq.style.display = '';
  } else if(type === 'lab-only') {
    para = cust + ' will pay ' + entity + ' ' + fmtAmt + ' for ' + nrText + ' fees associated with a surgeon evaluation lab with up to ' + n + ' surgeons.';
    if(prereq) prereq.style.display = 'none';
  } else if(type === 'partial') {
    para = cust + ' will pay ' + entity + ' ' + fmtAmt + ' as a partial upfront payment for ' + nrText + ' fees to include design and prototyping of parts and contracting up to ' + n + ' surgeons associated with a surgeon evaluation lab.';
    if(prereq) prereq.style.display = '';
  }
  const fp = document.getElementById('fee-para');
  if(fp) fp.value = para;

  // Sync customer refs in IP clause
  document.querySelectorAll('.ip-cust-ref').forEach(e => e.textContent = cust);
  const ipC = document.getElementById('ip-customer');
  if(ipC) ipC.textContent = cust;
}

document.getElementById('ctx-customer').addEventListener('change', updateFeeLanguage);

// ══════════════════════════════════════════════════
// CALCULATIONS
// ══════════════════════════════════════════════════
function fmt(n) { return '$ ' + (parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function recalcRow(inp) {
  const row = inp.closest('tr');
  const nums = row.querySelectorAll('input.num');
  const qty   = parseFloat(nums[2]?.value)||0;
  const price = parseFloat(nums[3]?.value)||0;
  const ext = row.querySelector('input.ext');
  if(ext) ext.value = (qty*price).toFixed(2);
  recalcAll();
}

function recalcAll() {
  // Part table (PPQ / VVQ)
  const sections = {};
  let grand = 0;
  document.querySelectorAll('#part-tbody tr.part-row').forEach(row => {
    const sec = row.dataset.sec;
    const ext = row.querySelector('input.ext');
    const val = parseFloat(ext?.value)||0;
    sections[sec] = (sections[sec]||0) + val;
    grand += val;
  });
  Object.keys(sections).forEach(sec => {
    const el = document.getElementById('sec-total-'+sec);
    if(el) el.textContent = fmt(sections[sec]);
  });
  const gt = document.getElementById('grand-total');
  if(gt) gt.textContent = fmt(grand);

  // Fee table
  let labour = 0, direct = 0, feeTotal = 0;
  document.querySelectorAll('#fee-tbody tr.part-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const qty    = parseFloat(inputs[2]?.value)||0;
    const price  = parseFloat(inputs[3]?.value)||0;
    const ext    = qty * price;
    const extInp = row.querySelector('input.ext');
    if(extInp) extInp.value = ext ? ext.toFixed(2) : '';
    const typeEl = row.querySelector('select');
    const type   = typeEl ? typeEl.value : 'Labour';
    feeTotal += ext;
    if(type === 'Labour') labour += ext;
    else if(type === 'Direct') direct += ext;
  });
  const ls = document.getElementById('labour-sub-val');
  const ds = document.getElementById('direct-sub-val');
  const ft = document.getElementById('fee-total');
  if(ls) ls.textContent = fmt(labour);
  if(ds) ds.textContent = fmt(direct);
  if(ft) ft.textContent = fmt(feeTotal);

  // Production flat
  let prodTotal = 0;
  document.querySelectorAll('#prod-flat-tbody tr.part-row').forEach(row => {
    const inputs = row.querySelectorAll('input.num');
    const qty   = parseFloat(inputs[0]?.value)||0;
    const price = parseFloat(inputs[1]?.value)||0;
    const ext   = qty*price;
    const ei = row.querySelector('input.ext');
    if(ei) ei.value = ext ? ext.toFixed(2) : '';
    prodTotal += ext;
  });
  const pft = document.getElementById('prod-flat-total');
  if(pft) pft.textContent = fmt(prodTotal);

  recalcTlgAll();
  recalcTstAll();
  // Sync the calculated total back to the app meta-value field
  if(typeof syncTotalToApp === 'function') syncTotalToApp();
}

function recalcProdRow(inp) { recalcAll(); }

function recalcTlgRow(inp) { recalcTlgAll(); }
function recalcTlgAll() {
  let sub = 0;
  document.querySelectorAll('#tlg-tbody tr.part-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const qty   = parseFloat(inputs[4]?.value)||0;
    const price = parseFloat(inputs[5]?.value)||0;
    const ext   = qty*price;
    const ei    = row.querySelector('input.ext');
    if(ei) ei.value = ext ? ext.toFixed(2) : '';
    sub += ext;
  });
  const tlgT = document.getElementById('tlg-total');
  if(tlgT) tlgT.textContent = fmt(sub);
  const pct = parseFloat(document.getElementById('surcharge-pct')?.value)||0;
  const surAmt = sub * pct / 100;
  const surEl = document.getElementById('surcharge-amt');
  const grandEl = document.getElementById('tlg-grand-total');
  if(surEl) surEl.textContent = pct > 0 ? '+' + fmt(surAmt) + ' (' + pct + '%)' : '';
  if(grandEl) grandEl.textContent = fmt(sub + surAmt);
  if(typeof syncTotalToApp === 'function') syncTotalToApp();
}

function recalcFeeRow(inp) { recalcAll(); }

function recalcExpRow(inp) {
  const row = inp.closest('tr');
  if(!row) return;
  const qtyInp  = row.querySelector('.scope-qty');
  const costInp = row.querySelector('.scope-num');
  const extInp  = row.querySelector('.scope-ext');
  const qty  = parseFloat(qtyInp?.value)  || 1;
  const cost = parseFloat(costInp?.value) || 0;
  const ext  = qty * cost;
  if(extInp) extInp.value = ext ? ext.toFixed(2) : '';
  recalcExpAll();
}

function recalcExpAll() {
  let labour = 0, direct = 0, total = 0;
  document.querySelectorAll('#scope-exp-tbody tr.exp-ws-row').forEach(row => {
    const ext  = parseFloat(row.querySelector('.scope-ext')?.value) || 0;
    const type = row.querySelector('select')?.value || 'Labour';
    total += ext;
    if(type === 'Labour') labour += ext;
    else direct += ext; // Direct + Third party both go to direct subtotal
  });
  const totEl  = document.getElementById('exp-ws-total');
  const labEl  = document.getElementById('exp-labour-sub-val');
  const dirEl  = document.getElementById('exp-direct-sub-val');
  if(totEl) totEl.textContent = fmt(total);
  if(labEl) labEl.textContent = fmt(labour);
  if(dirEl) dirEl.textContent = fmt(direct);
  // Sync to app meta-value
  const appInput = document.getElementById('meta-value');
  if(appInput && total > 0) {
    appInput.value = total.toFixed(2);
    appInput.style.borderColor = 'var(--teal)';
    setTimeout(() => { appInput.style.borderColor = ''; }, 1500);
  }
}

function recalcTstRow(inp) { recalcTstAll(); }
function recalcTstAll() {
  let total = 0;
  document.querySelectorAll('#tst-tbody tr.part-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const qty   = parseFloat(inputs[3]?.value)||0;
    const price = parseFloat(inputs[4]?.value)||0;
    const ext   = qty*price;
    const ei    = row.querySelector('input.ext');
    if(ei) ei.value = ext ? ext.toFixed(2) : '';
    total += ext;
  });
  const tt = document.getElementById('tst-total');
  if(tt) tt.textContent = fmt(total);
  if(typeof syncTotalToApp === 'function') syncTotalToApp();
}

function toggleLab(el) {
  if(el.textContent==='Y'){el.textContent='N';el.classList.replace('at-lab-y','at-lab-n');}
  else{el.textContent='Y';el.classList.replace('at-lab-n','at-lab-y');}
}

// PASTE FROM EXCEL
// ══════════════════════════════════════════════════
document.addEventListener('paste', function(e) {
  const active = document.activeElement;
  const ph = document.getElementById('paste-hidden');
  if(active && active !== ph && (active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.isContentEditable)) return;
  e.preventDefault();
  const text = e.clipboardData.getData('text/plain');
  if(text) processPaste(text);
});

function processPaste(raw) {
  if(!raw||!raw.trim()) return;
  const rows = raw.split(/\r?\n/).map(r=>r.split('\t')).filter(r=>r.some(c=>c.trim()));
  if(!rows.length) return;
  const firstRow = rows[0];
  const looksLikeHeader = firstRow.every(c=>isNaN(parseFloat(c.trim()))||c.trim()==='');
  const dataRows = looksLikeHeader ? rows.slice(1) : rows;
  if(!dataRows.length) return;
  const sec = document.getElementById('paste-target-section')?.value || 'A';
  const tbody = document.getElementById('part-tbody');
  const grandRow = document.getElementById('grand-total-row');
  let inserted = 0;
  dataRows.forEach(cols => {
    while(cols.length<7) cols.push('');
    const custPN  = (cols[0]||'').trim();
    const tyberPN = (cols[1]||'').trim();
    const desc    = (cols[2]||'').trim();
    const bom     = (cols[3]||'').trim();
    const bomQty  = parseFloat((cols[4]||'').replace(/[^0-9.]/g,''))||'';
    const extQty  = parseFloat((cols[5]||'').replace(/[^0-9.]/g,''))||'';
    const price   = parseFloat((cols[6]||'').replace(/[^0-9.]/g,''))||'';
    if(!custPN&&!tyberPN&&!desc) return;
    const tr = makePartRow(sec);
    const inputs = tr.querySelectorAll('input');
    if(inputs[0]) inputs[0].value = custPN;
    if(inputs[1]) inputs[1].value = tyberPN;
    if(inputs[2]) inputs[2].value = desc;
    if(inputs[3]) inputs[3].value = bom;
    if(inputs[4]) inputs[4].value = bomQty;
    if(inputs[5]) inputs[5].value = extQty;
    if(inputs[6]) inputs[6].value = price ? parseFloat(price).toFixed(2) : '';
    const qty = parseFloat(extQty)||0;
    const pr  = parseFloat(price)||0;
    if(inputs[7]) inputs[7].value = (qty*pr).toFixed(2);
    tbody.insertBefore(tr, grandRow);
    inserted++;
  });
  recalcAll();
  const ph = document.getElementById('paste-hidden');
  if(ph) ph.value = '';
  const pz = document.getElementById('paste-zone');
  if(pz) { pz.style.background='#b8f0da'; setTimeout(()=>pz.style.background='',1200); }
}

function syncSectionDropdown() {
  const sel = document.getElementById('paste-target-section');
  if(!sel) return;
  const current = sel.value;
  const sections = [];
  document.querySelectorAll('#part-tbody tr.sec-hdr').forEach(r=>{
    const sec = r.dataset.section;
    const name = r.querySelector('input.sec-name-inp');
    sections.push({sec, label: name ? name.value : 'Section '+sec});
  });
  sel.innerHTML = sections.map(s=>`<option value="${s.sec}"${s.sec===current?' selected':''}>${s.label}</option>`).join('');
}

const obs = new MutationObserver(syncSectionDropdown);
obs.observe(document.getElementById('part-tbody'), {childList:true, subtree:true});

// Purge any stale template snapshots that predate the header entity/type labels.
// Runs once; stale snapshots are re-generated fresh the next time each quote is opened.
(function purgeStaleSnapshots(){
  const REQUIRED = ['tmpl-issue-date','terms-validity','lt-leadtime','hdr-entity-name','hdr-quote-type','block-lab','sig-hd-sub','meta-leadtime','scope-context-text'];
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    if(key && key.startsWith('exalta_tmpl_')){
      const snap = localStorage.getItem(key);
      if(snap && !REQUIRED.every(id => snap.includes(id))){
        localStorage.removeItem(key);
        i--; // adjust index after removal
      }
    }
  }
})();

// ── MICROBIOLOGY LAB SERVICES functions ─────────────────────────────
function recalcLabRow(el){
  const tr = el.closest('tr');
  if(!tr) return;
  // col 4 = qty (td:nth-child(4) .num), col 5 = unit price (td:nth-child(5) .num)
  const qty   = parseFloat(tr.querySelector('td:nth-child(4) input')?.value) || 0;
  const price = parseFloat(tr.querySelector('td:nth-child(5) input')?.value) || 0;
  // col 6 = expedite checkbox (only rows that have one; Microbial ID has a dash)
  const chk   = tr.querySelector('.lab-exp-chk');
  const exp   = (chk && chk.checked) ? 1.5 : 1.0;
  const ext   = tr.querySelector('.ext');
  if(ext) ext.value = (qty * price * exp).toFixed(2);
  recalcLabAll();
}

function recalcLabAll(){
  let total = 0;
  document.querySelectorAll('#lab-tbody .ext').forEach(e => { total += parseFloat(e.value)||0; });
  const el = document.getElementById('lab-total');
  if(el) el.textContent = '$ ' + total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}


function addLabRow(){
  const tbody = document.getElementById('lab-tbody');
  if(!tbody) return;
  // Insert before the grand-total row
  const grandRow = tbody.querySelector('tr.grand-tr');
  const tr = document.createElement('tr');
  tr.className = 'part-row';
  tr.innerHTML = '<td><input type="text" placeholder="Test / service name"></td>'
    + '<td><input type="text" placeholder="ISO standard"></td>'
    + '<td><input type="text" placeholder="Notes / scope"></td>'
    + '<td><input type="number" class="num" style="text-align:center" placeholder="1" min="0" oninput="recalcLabRow(this)"></td>'
    + '<td><input type="number" class="num" placeholder="0.00" min="0" step="0.01" oninput="recalcLabRow(this)"></td>'
    + '<td style="text-align:center"><input type="checkbox" class="lab-exp-chk" onchange="recalcLabRow(this)"></td>'
    + '<td><input type="number" class="ext" placeholder="0.00" readonly tabindex="-1"></td>'
    + '<td><button class="del-btn" onclick="delRow(this)">×</button></td>';
  if(grandRow) tbody.insertBefore(tr, grandRow);
  else tbody.appendChild(tr);
}

function toggleAllLabExpedite(checked){
  document.querySelectorAll('#lab-tbody .lab-exp-chk').forEach(chk => {
    chk.checked = checked;
    recalcLabRow(chk);
  });
}
